services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: botct-backend
    ports:
      - "3002:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-botct-change-this-secret-in-production}
      - FRONTEND_URL=${FRONTEND_URL:-http://${SERVER_IP:-192.168.0.15}:3000}
      - DB_PATH=/app/data/botct.db
    volumes:
      - botct-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${API_URL:-http://${SERVER_IP:-192.168.0.15}:3001}
    container_name: botct-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  botct-data:
